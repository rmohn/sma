<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>San Miguel de Allende - Restaurant Recommendations</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <img src="image.jpg" alt="San Miguel de Allende">
</header>

<div class="container">

  <h2>San Miguel de Allende</h2>
  <h1>Restaurant Recommendations</h1>

  <div class="controls">
    <div class="control">
      <label>Search</label>
      <input id="search" type="text" placeholder="Search..." />
    </div>

    <div class="control">
      <label>Filter by Type</label>
      <select id="typeFilter">
        <option value="">All types</option>
      </select>
    </div>

    <div class="control">
      <label>Sort by</label>
      <select id="sortBy">
        <option value="name">Name</option>
        <option value="type">Type</option>
        <option value="rating">Rating</option>
      </select>
    </div>

    <div class="control">
      <label>&nbsp;</label>
      <button class="btn" id="sortDirBtn">Ascending ▲</button>
    </div>
  </div>

  <div class="meta">
    <div class="pill" id="countPill">0 items</div>
    <button class="btn" id="resetBtn">Reset</button>
  </div>

  <table id="data-table">
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Description</th>
        <th>Rating</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>
  let allItems = [];
  let sortAsc = true;

  const els = {
    tbody: document.querySelector("#data-table tbody"),
    search: document.getElementById("search"),
    typeFilter: document.getElementById("typeFilter"),
    sortBy: document.getElementById("sortBy"),
    sortDirBtn: document.getElementById("sortDirBtn"),
    resetBtn: document.getElementById("resetBtn"),
    countPill: document.getElementById("countPill"),
  };

  function toNumberRating(r) {
    if (!r) return null;
    const match = String(r).match(/(\d+(\.\d+)?)/);
    return match ? parseFloat(match[1]) : null;
  }

  function starsHtml(rating) {
    if (rating === null) {
      return `<span class="no-rating">No rating</span>`;
    }

    let html = `<span class="stars">`;
    for (let i = 1; i <= 5; i++) {
      const portion = Math.max(0, Math.min(1, rating - (i - 1)));
      const pct = (portion * 100).toFixed(0);
      html += `<span class="star"><span class="fill" style="width:${pct}%"></span></span>`;
    }
    html += `</span><span class="rating-text">${rating.toFixed(1)}/5</span>`;
    return html;
  }

  function refresh() {
    let items = [...allItems];
    const search = els.search.value.toLowerCase();
    const type = els.typeFilter.value;

    if (type) items = items.filter(i => i.type === type);

    if (search) {
      items = items.filter(i =>
        `${i.name} ${i.type} ${i.description}`.toLowerCase().includes(search)
      );
    }

    const sortBy = els.sortBy.value;

    items.sort((a, b) => {
      if (sortBy === "rating") {
        const ra = toNumberRating(a.rating);
        const rb = toNumberRating(b.rating);
        return sortAsc ? (ra ?? -1) - (rb ?? -1) : (rb ?? -1) - (ra ?? -1);
      } else {
        return sortAsc
          ? a[sortBy].localeCompare(b[sortBy])
          : b[sortBy].localeCompare(a[sortBy]);
      }
    });

    els.tbody.innerHTML = "";

    items.forEach(item => {
      const ratingNum = toNumberRating(item.rating);
      const row = document.createElement("tr");
      row.innerHTML = `
        <td><a href="${item.url}" target="_blank">${item.name}</a></td>
        <td>${item.type}</td>
        <td>${item.description}</td>
        <td>${starsHtml(ratingNum)}</td>
      `;
      els.tbody.appendChild(row);
    });

    els.countPill.textContent = `${items.length} items`;
  }

  els.search.addEventListener("input", refresh);
  els.typeFilter.addEventListener("change", refresh);
  els.sortBy.addEventListener("change", refresh);

  els.sortDirBtn.addEventListener("click", () => {
    sortAsc = !sortAsc;
    els.sortDirBtn.textContent = sortAsc ? "Ascending ▲" : "Descending ▼";
    refresh();
  });

  els.resetBtn.addEventListener("click", () => {
    els.search.value = "";
    els.typeFilter.value = "";
    els.sortBy.value = "name";
    sortAsc = true;
    els.sortDirBtn.textContent = "Ascending ▲";
    refresh();
  });

  fetch("data.json")
    .then(r => r.json())
    .then(data => {
      allItems = data;
      const types = [...new Set(data.map(d => d.type))].sort();
      types.forEach(t => {
        const option = document.createElement("option");
        option.value = t;
        option.textContent = t;
        els.typeFilter.appendChild(option);
      });
      refresh();
    });
</script>

</body>
</html>
